name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install -r requirements.txt
          pip install pinecone pytest pytest-html

      - name: Download NLTK data
        run: |
          source venv/bin/activate
          python -c "import nltk; nltk.download('stopwords'); nltk.download('punkt_tab')"

      - name: Run tests
        run: |
          source venv/bin/activate
          pytest -v --ignore=tests/test_embedding_manager.py --html=report.html --self-contained-html

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report-chunken
          path: report.html